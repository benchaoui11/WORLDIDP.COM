<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Admin Sign In | WorldIDP</title>
<link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div class="login-screen">
    <form class="login-card" id="login-form" autocomplete="on">
      <div class="login-brand">
        <div class="mark">W</div>
        <div class="name">WorldIDP<small>Control Tower</small></div>
      </div>
      <h1 class="login-title">Sign in</h1>
      <p class="login-sub">Private admin access. Authorized personnel only.</p>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>

      <button class="login-btn" type="submit" id="login-btn">Sign in</button>
      <p class="login-error" id="login-error" role="alert"></p>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/supabase-config.js"></script>
  <script>
    (async function () {
      const cfg = window.WORLDIDP_SUPABASE || {};
      const client = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

      // Already signed in? go straight to the dashboard.
      const { data: { session } } = await client.auth.getSession();
      if (session) { location.href = '/admin'; return; }

      const form = document.getElementById('login-form');
      const btn = document.getElementById('login-btn');
      const errBox = document.getElementById('login-error');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errBox.classList.remove('show');
        btn.disabled = true; btn.textContent = 'Signing in…';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        const { error } = await client.auth.signInWithPassword({ email, password });

        if (error) {
          errBox.textContent = 'Incorrect email or password.';
          errBox.classList.add('show');
          btn.disabled = false; btn.textContent = 'Sign in';
          return;
        }
        location.href = '/admin';
      });
    })();
  </script>
</body>
</html>
